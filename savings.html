<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Add Savings | MELOSAV</title>

<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="savings.css">
<link rel="stylesheet" href="melo-toast.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="top-header">

<a href="home.html"
class="back-btn">

←

</a>

<h2>

🏦 Add Savings

</h2>

<div></div>

</header>


<!-- ================= SAVINGS CARD ================= -->

<section class="savings-card">

<div class="icon">

🏦

</div>

<h1>

Build Your Future

</h1>

<p>

Every amount you save today is a step toward achieving your dreams and financial freedom.

</p>

<form id="savingsForm">

<div class="input-group">

<label>

Amount (₦)

</label>

<input
type="number"
id="amount"
placeholder="Enter amount"
required>

</div>

<div class="input-group">

<label>

Savings Category

</label>

<select id="category">

<option>🎯 Emergency Fund</option>

<option>🏠 Rent</option>

<option>🎓 Education</option>

<option>✈️ Travel</option>

<option>🚗 Car</option>

<option>📱 Gadget</option>

<option>💍 Family</option>

<option>💼 Investment</option>

<option>📦 Other</option>

</select>

</div>

<div class="input-group">

<label>

Description

</label>

<textarea
id="description"
rows="4"
placeholder="Example: Monthly savings contribution"></textarea>

</div>


<!-- ================= MELO AI ================= -->

<div class="melo-tip">

<h3>

🤖 Melo AI

</h3>

<p>

Saving consistently is one of the most powerful financial habits you can build. Even small amounts grow into something meaningful over time.

</p>

</div>


<button
type="submit"
class="save-btn">

🏦 Save Money

</button>

</form>

</section>

<script src="theme.js"></script>
<script src="melo-toast.js"></script>
<script src="savings.js"></script>

</body>

</html>
