<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile | MELOSAV</title>

<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="profile.css">
<link rel="stylesheet" href="melo-toast.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

</head>

<body>

<!-- HEADER -->

<header class="page-header">

<a href="home.html"
class="back-btn">

←

</a>

<h1>My Profile</h1>

</header>

<!-- PROFILE CARD -->

<section class="profile-card">

<div class="avatar"
id="avatar">

M

</div>

<h2 id="profileName">

Loading...

</h2>

<p id="profileEmail">

Loading...

</p>

</section>

<!-- BALANCE -->

<section class="balance-card">

<h3>Total Balance</h3>

<h1 id="profileBalance">

₦0.00

</h1>

</section>

<!-- STATS -->

<section class="stats-grid">

<div class="stat-card">

<h2 id="incomeStat">

₦0

</h2>

<span>Income</span>

</div>

<div class="stat-card">

<h2 id="expenseStat">

₦0

</h2>

<span>Expenses</span>

</div>

<div class="stat-card">

<h2 id="savingStat">

₦0

</h2>

<span>Savings</span>

</div>

<div class="stat-card">

<h2 id="goalStat">

0

</h2>

<span>Goals</span>

</div>

</section>

<!-- ACHIEVEMENTS -->

<section class="profile-section">

<h2>

🏆 Achievements

</h2>

<div class="achievement-grid">

<div class="achievement">

🥇

<span>Starter</span>

</div>

<div class="achievement">

🎯

<span>Goal Crusher</span>

</div>

<div class="achievement">

🔥

<span>Streak</span>

</div>

<div class="achievement">

💎

<span>Saver</span>

</div>

</div>

</section>

<!-- SETTINGS -->

<section class="profile-section">

<h2>

⚙️ Account

</h2>

<button id="editBtn">

✏️ Edit Profile

</button>

<button id="themeBtn">

🎨 Change Theme

</button>

<button id="pinBtn">

🔒 Change PIN

</button>

<button id="shareBtn">

📤 Share MELOSAV

</button>

<button id="logoutBtn"
class="logout">

🚪 Logout

</button>

</section>

<script src="storage.js"></script>
<script src="theme.js"></script>
<script src="melo-toast.js"></script>
<script src="profile.js"></script>

</body>
</html>
