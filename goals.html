<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Goals | MELOSAV</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7B2CFF">

<link rel="stylesheet" href="theme.css">

<link rel="stylesheet" href="goals.css">

<link rel="stylesheet" href="melo-toast.css">


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">


</head>


<body>



<!-- HEADER -->

<header class="page-header">


<a href="home.html" class="back-btn">

←

</a>



<div>

<h1>
🎯 Savings Goals
</h1>


<p>
Create goals and achieve them one step at a time.
</p>


</div>


</header>





<!-- SUMMARY -->

<section class="summary-card">


<div class="summary-item">

<h2 id="totalGoals">
0
</h2>

<span>
Total Goals
</span>

</div>




<div class="summary-item">

<h2 id="completedGoals">
0
</h2>

<span>
Completed
</span>

</div>





<div class="summary-item">

<h2 id="savedGoals">
₦0
</h2>

<span>
Saved
</span>

</div>


</section>







<!-- MELO AI -->

<section class="melo-ai">


<div class="ai-icon">

🤖

</div>



<div>


<h3>
Melo AI
</h3>


<p id="goalTip">

Every goal starts with one small deposit. Keep going! 💜

</p>



</div>


</section>







<!-- GOALS SECTION -->

<section class="goal-section">


<div class="section-title">


<h2>
Your Goals
</h2>



<button id="createGoalBtn" onclick="openGoalModal()">
    + New Goal
</button>



</div>





<div id="goalList">


<div class="empty-state">


<h2>
🎯
</h2>


<h3>
No Goals Yet
</h3>


<p>
Create your first savings goal and begin your financial journey.
</p>


</div>


</div>



</section>








<!-- CREATE GOAL MODAL -->

<div class="goal-modal" id="goalModal">


<div class="goal-box">



<h2>
Create Goal
</h2>




<input

type="text"

id="goalName"

placeholder="Goal Name"

>





<input

type="number"

id="goalAmount"

placeholder="Target Amount"

>





<input

type="date"

id="goalDate"

>





<div class="modal-buttons">



<button id="cancelGoal">

Cancel

</button>




<button id="saveGoal">

Save Goal

</button>



</div>



</div>


</div>









<!-- FLOATING BUTTON -->

<button class="fab" id="fab" onclick="openGoalModal()">
    +
</button>








<!-- SCRIPTS -->


<script src="storage.js"></script>

<script src="theme.js"></script>

<script src="melo-toast.js"></script>

<script src="celebration.js"></script>

<script src="goals.js"></script>

<script src="pwa.js"></script>



</body>


</html>
