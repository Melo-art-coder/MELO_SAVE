<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Home | MELOSAV</title>

<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="home.css">
<link rel="stylesheet" href="melo-toast.css">


</head>

<body>

<header class="top-header">

<div class="user-info">

<img
src="logo.png"
class="profile-pic"
alt="MELOSAV">

<div>

<p id="greeting">
Good Morning 👋
</p>

<h2 id="username">
Loading...
</h2>

</div>

</div>

<div class="header-actions">

<button id="notificationBtn">
🔔
</button>

<button id="themeBtn">
🎨
</button>

</div>

</header>


<section class="balance-card">

<div class="wallet-slider" id="walletSlider">

    <!-- Naira -->

    <div class="wallet-card naira">

        <div class="wallet-top">

            <span>Total Balance</span>

            <div class="wallet-actions">

                <button id="toggleBalance">👁️</button>

            </div>

        </div>

        <h1 id="balance">
            ₦0.00
        </h1>

        <div class="wallet-stats">

            <div>
                <small>Income</small>
                <h3 id="income">₦0</h3>
            </div>

            <div>
                <small>Expense</small>
                <h3 id="expenses">₦0</h3>
            </div>

            <div>
                <small>Savings</small>
                <h3 id="savings">₦0</h3>
            </div>

        </div>

    </div>

    <!-- Dollar -->

    <div class="wallet-card dollar">

        <div class="wallet-top">
            <span>US Wallet 🇺🇸</span>
        </div>

        <h1 id="usdBalance">$0.00</h1>

    </div>

    <!-- Euro -->

    <div class="wallet-card euro">

        <div class="wallet-top">
            <span>Euro Wallet 🇪🇺</span>
        </div>

        <h1 id="eurBalance">€0.00</h1>

    </div>

    <!-- Pound -->

    <div class="wallet-card pound">

        <div class="wallet-top">
            <span>UK Wallet 🇬🇧</span>
        </div>

        <h1 id="gbpBalance">£0.00</h1>

    </div>

</div>

<div class="wallet-dots">

    <span class="active"></span>
    <span></span>
    <span></span>
    <span></span>

</div>

<div class="balance-details">

<div>

<span>Income</span>

<h3 id="income">
₦0
</h3>

</div>

<div>

<span>Expenses</span>

<h3 id="expenses">
₦0
</h3>

</div>

<div>

<span>Savings</span>

<h3 id="savings">
₦0
</h3>

</div>

</div>

</section>


<section class="quick-actions">

<button id="incomeBtn">
💰
<span>Income</span>
</button>

<button id="expenseBtn">
💸
<span>Expense</span>
</button>

<button id="saveBtn">
🏦
<span>Save</span>
</button>

<button id="goalBtn">
🎯
<span>Goals</span>
</button>

</section>


<section class="dashboard-card">

<h2>Recent Transactions</h2>

<div id="transactionList">

<p>No transactions yet.</p>

</div>

</section>


<button class="fab" id="fab">
+
</button>


<nav class="bottom-nav">

<a href="home.html">🏠</a>

<a href="goals.html">🎯</a>

<a href="profile.html">👤</a>

</nav>

<script src="storage.js"></script>
<script src="theme.js"></script>
<script src="melo-toast.js"></script>
<script src="home.js"></script>

</body>

</html>
