<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login | MELOSAV</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="login-container">

    <img src="logo.png" alt="MELOSAV Logo">

    <h1>Welcome Back</h1>

    <p class="subtitle">

        Log in to continue saving smarter.

    </p>

    <div class="login-card">

        <div class="input-group">

            <label>Email Address</label>

            <input
                type="email"
                id="email"
                placeholder="example@email.com">

        </div>

        <div class="input-group">

            <label>PIN</label>

            <div class="pin-box">

                <input
                    type="password"
                    id="pin"
                    maxlength="6"
                    inputmode="numeric"
                    placeholder="Enter PIN">

                <button
                    type="button"
                    id="togglePin">

                    👁️

                </button>

            </div>

        </div>

        <button id="loginBtn">

            Login

        </button>

        <div class="signup-link">

            Don't have an account?

            <a href="signup.html">

                Create Account

            </a>

        </div>

    </div>

</div>

<script src="storage.js"></script>
<script src="theme.js"></script>
<script src="login.js"></script>

</body>

</html>
