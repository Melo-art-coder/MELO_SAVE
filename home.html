<!DOCTYPE html>

<header class="top-header">

<div class="user-info">

<img
src="logo.png"
class="profile-pic"
alt="MELOSAV">

<div>

<p id="greeting">
Good Morning 👋
</p>

</div>

</div>

<div class="header-actions">

<section class="balance-card">

</div>

<section class="quick-actions">

<button id="incomeBtn">
